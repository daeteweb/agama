name: Generate Manifest and Sidebar

on:
  push:
    branches:
      - main
    paths:
      - 'suttas/sa/**'
  workflow_dispatch:

# --- 加入這段來消除警告 ---
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
# -----------------------

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Run Generator
      shell: pwsh
      run: |
        $volumeRanges = @(
            @{ name = "第 01 卷 (五陰相應)"; start = 1; end = 32 },
            @{ name = "第 02 卷 (五陰相應)"; start = 33; end = 58 },
            @{ name = "第 03 卷 (五陰相應)"; start = 59; end = 87 },
            @{ name = "第 04 卷 (五陰相應)"; start = 88; end = 102 },
            @{ name = "第 05 卷 (五陰相應)"; start = 103; end = 110 },
            @{ name = "第 06 卷 (羅陀相應、見相應)"; start = 111; end = 138 },
            @{ name = "第 07 卷 (斷知相應、六入處相應)"; start = 139; end = 187 },
            @{ name = "第 08 卷 (六入處相應)"; start = 188; end = 229 },
            @{ name = "第 09 卷 (六入處相應)"; start = 230; end = 255 },
            @{ name = "第 10 卷 (六入處相應)"; start = 256; end = 272 },
            @{ name = "第 11 卷 (六入處相應)"; start = 273; end = 282 },
            @{ name = "第 12 卷 (六入處相應)"; start = 283; end = 303 },
            @{ name = "第 13 卷 (六入處相應、受相應)"; start = 304; end = 342 },
            @{ name = "第 14 卷 (界相應、因緣相應)"; start = 343; end = 370 },
            @{ name = "第 15 卷 (因緣相應、食相應、諦相應)"; start = 371; end = 406 },
            @{ name = "第 16 卷 (諦相應、界相應、受相應)"; start = 407; end = 465 },
            @{ name = "第 17 卷 (受相應、念處相應)"; start = 466; end = 490 },
            @{ name = "第 18 卷 (念處相應)"; start = 491; end = 503 },
            @{ name = "第 19 卷 (念處相應、正勤相應、如意足相應)"; start = 504; end = 534 },
            @{ name = "第 20 卷 (如意足相應、根相應)"; start = 535; end = 558 },
            @{ name = "第 21 卷 (根相應、力相應)"; start = 559; end = 575 },
            @{ name = "第 22 卷 (覺支相應)"; start = 576; end = 603 },
            @{ name = "第 23 卷 (阿育王傳)"; start = 604; end = 604 },
            @{ name = "第 24 卷 (覺支相應、聖道分相應)"; start = 605; end = 639 },
            @{ name = "第 25 卷 (阿育王傳)"; start = 640; end = 641 },
            @{ name = "第 26 卷 (聖道分相應、安那般那念相應)"; start = 642; end = 711 },
            @{ name = "第 27 卷 (安那般那念相應、學相應、不壞淨相應)"; start = 712; end = 747 },
            @{ name = "第 28 卷 (不壞淨相應、慈相應)"; start = 748; end = 800 },
            @{ name = "第 29 卷 (念相應)"; start = 801; end = 815 },
            @{ name = "第 30 卷 (不壞淨相應、念相應)"; start = 816; end = 860 },
            @{ name = "第 31 卷 (念相應、比丘相應)"; start = 861; end = 904 },
            @{ name = "第 32 卷 (比丘相應、魔相應)"; start = 905; end = 930 },
            @{ name = "第 33 卷 (魔相應、帝釋相應)"; start = 931; end = 946 },
            @{ name = "第 34 卷 (帝釋相應、剎利相應、婆羅門相應)"; start = 947; end = 972 },
            @{ name = "第 35 卷 (婆羅門相應、梵天相應、比丘尼相應、婆耆舍相應)"; start = 973; end = 994 },
            @{ name = "第 36 卷 (諸天相應)"; start = 995; end = 1022 },
            @{ name = "第 37 卷 (諸天相應、夜叉相應)"; start = 1023; end = 1061 },
            @{ name = "第 38 卷 (林相應)"; start = 1062; end = 1083 },
            @{ name = "第 39 卷 (弟子所說相應)"; start = 1084; end = 1103 },
            @{ name = "第 40 卷 (弟子所說相應)"; start = 1104; end = 1121 },
            @{ name = "第 41 卷 (如來所說相應)"; start = 1122; end = 1144 },
            @{ name = "第 42 卷 (如來所說相應)"; start = 1145; end = 1163 },
            @{ name = "第 43 卷 (如來所說相應)"; start = 1164; end = 1187 },
            @{ name = "第 44 卷 (如來所說相應)"; start = 1188; end = 1221 },
            @{ name = "第 45 卷 (如來所說相應)"; start = 1222; end = 1240 },
            @{ name = "第 46 卷 (譬喻相應)"; start = 1241; end = 1266 },
            @{ name = "第 47 卷 (譬喻相應、大迦葉相應、聚落主相應)"; start = 1267; end = 1310 },
            @{ name = "第 48 卷 (馬有相應、離車相應、雜相應)"; start = 1311; end = 1330 },
            @{ name = "第 49 卷 (譬喻相應、弟子所說相應)"; start = 1331; end = 1343 },
            @{ name = "第 50 卷 (使相應、道品相應)"; start = 1344; end = 1362 }
        )

        $manifest = @()
        
        # 建立 Sidebar 的頂部內容
        $sidebarMd = "* [🏠 首頁](README.md)`n`n* **雜阿含經**`n"

        foreach ($vol in $volumeRanges) {
            $currentVolume = @{ volume_name = $vol.name; items = @() }
            $hasItems = $false
            
            # Markdown 目錄階層 (縮排一層)
            $volMd = "  * **$($vol.name)**`n"

            foreach ($i in $vol.start..$vol.end) {
                $id = "sa" + $i.ToString("0000")
                
                if ($i -le 500) { $subDir = "v01" }
                elseif ($i -le 1000) { $subDir = "v02" }
                else { $subDir = "v03" }

                $filePath = "suttas/sa/$subDir/$id.md"

                if (Test-Path $filePath) {
                    $hasItems = $true
                    $content = Get-Content $filePath -Encoding utf8 -TotalCount 5
                    $firstLine = $content | Select-Object -First 1
                    $title = $firstLine.Replace('#', '').Trim()
                    
                    $currentVolume.items += @{
                        id = $id
                        title = $title
                        path = $filePath
                    }
                    
                    # Markdown 經文連結 (縮排兩層)
                    $volMd += "    * [$title]($filePath)`n"
                }
            }
            if ($hasItems) { 
                $manifest += $currentVolume 
                $sidebarMd += $volMd
            }
        }
        
        # 加上中阿含、長阿含的佔位符
        $sidebarMd += "`n* **中阿含經**`n  * (整理中...)`n`n* **長阿含經**`n  * (整理中...)`n"

        # 輸出 JSON
        $json = $manifest | ConvertTo-Json -Depth 10
        [System.IO.File]::WriteAllText("$pwd/manifest.json", $json, [System.Text.Encoding]::UTF8)
        
        # 輸出 Sidebar Markdown
        [System.IO.File]::WriteAllText("$pwd/_sidebar.md", $sidebarMd, [System.Text.Encoding]::UTF8)

    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add manifest.json _sidebar.md
        git diff --quiet && git diff --staged --quiet || (git commit -m "auto: update manifest.json and sidebar" && git push)
