name: Auto Generate Sidebar

on:
  push:
    paths:
      - 'suttas/**' # 只有當 suttas 資料夾有變動時才觸發

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Generate Sidebar
        run: |
          printf "* [首頁](README.md)\n\n" > _sidebar.md
          printf "* 雜阿含經\n" >> _sidebar.md
          # 修正：確保路徑不會重複，並排除 README.md
          find suttas -name "*.md" | sort | while read file; do
            # 抓取第一行作為標題
            title=$(head -n 1 "$file" | sed 's/[#*]//g' | xargs)
            # 確保產出的連結格式為 [標題](suttas/檔名.md)
            printf "  * [%s](%s)\n" "$title" "$file" >> _sidebar.md
          done

      - name: Commit and Push changes
        run: |
          git config --global user.name "Github Action"
          git config --global user.email "action@github.com"
          git add _sidebar.md
          git commit -m "Auto-update sidebar [skip ci]" || exit 0
          git push
