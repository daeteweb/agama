name: Auto Generate Sidebar

on:
  push:
    paths:
      - 'suttas/**' # 只有當 suttas 資料夾有變動時才觸發

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Generate Sidebar
        run: |
          echo "* [首頁](README.md)" > _sidebar.md
          echo "" >> _sidebar.md
          echo "* 雜阿含經" >> _sidebar.md
          # 掃描 suttas 資料夾下的 md 檔案並按名稱排序
          find suttas -name "*.md" | sort | while read file; do
            # 取得檔名作為基礎
            filename=$(basename "$file" .md)
            # 讀取檔案第一行作為顯示名稱（去掉 Markdown 符號）
            title=$(head -n 1 "$file" | sed 's/[#*]//g' | xargs)
            echo "  * [$title]($file)" >> _sidebar.md
          done

      - name: Commit and Push changes
        run: |
          git config --global user.name "Github Action"
          git config --global user.email "action@github.com"
          git add _sidebar.md
          git commit -m "Auto-update sidebar [skip ci]" || exit 0
          git push
