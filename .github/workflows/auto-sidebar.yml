name: Auto Generate Sidebar

on:
  push:
    paths:
      - 'suttas/**'
      - 'README.md'
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Generate Sidebar
        run: |
          # 1. 建立初始內容
          printf "* [🏠 首頁](README.md)\n\n" > _sidebar.md

          # 2. 定義要處理的分類
          # 格式： 資料夾路徑:顯示標題
          categories=("suttas/sa:雜阿含經" "suttas/ma:中阿含經" "suttas/da:長阿含經")

          for entry in "${categories[@]}"; do
            path="${entry%%:*}"
            title="${entry#*:}"

            printf "* **$title**\n" >> _sidebar.md

            if [ -d "$path" ] && [ "$(ls -A $path/*.md 2>/dev/null)" ]; then
              count=0
              # 取得排序後的檔案清單
              files=$(find "$path" -maxdepth 1 -name "*.md" | sort)
              
              for file in $files; do
                # 每 100 筆建立一個子分類標籤
                if [ $((count % 100)) -eq 0 ]; then
                  start=$((count + 1))
                  end=$((count + 100))
                  printf "  * **第 $start - $end 經**\n" >> _sidebar.md
                fi

                # 抓取檔案標題
                display_name=$(head -n 1 "$file" | sed 's/[#*]//g' | xargs)
                if [ -z "$display_name" ]; then
                  display_name=$(basename "$file" .md)
                fi
                
                # 寫入檔案連結（注意：這裡縮排兩次，讓它在「第 X-Y 經」下方）
                printf "    * [$display_name]($file)\n" >> _sidebar.md
                
                count=$((count + 1))
              done
            else
              printf "  * (整理中...)\n" >> _sidebar.md
            fi
            printf "\n" >> _sidebar.md
          done

      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add _sidebar.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update sidebar with virtual grouping [skip ci]" && git push)
