name: Auto Generate Sidebar

on:
  push:
    paths:
      - 'suttas/**'
      - 'README.md'
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Generate Sidebar
        run: |
          # 1. 建立初始內容
          printf "* [🏠 首頁](README.md)\n\n" > _sidebar.md

          # 2. 定義要處理的分類
          # 格式： 資料夾路徑:顯示標題
          categories=("suttas/sa:雜阿含經" "suttas/ma:中阿含經" "suttas/da:長阿含經")

          for entry in "${categories[@]}"; do
            path="${entry%%:*}"
            title="${entry#*:}"

            # 頂層分類：可折疊（docsify collapse 語法用 <details>/<summary>）
            printf "* **$title**\n" >> _sidebar.md

            if [ -d "$path" ] && ls "$path"/*.md > /dev/null 2>&1; then
              count=0
              group_open=0

              # 取得排序後的檔案清單
              files=$(find "$path" -maxdepth 1 -name "*.md" | sort)
              total=$(echo "$files" | wc -l | tr -d ' ')

              for file in $files; do
                # 每 50 篇開一個新子分類
                if [ $((count % 50)) -eq 0 ]; then
                  start=$((count + 1))
                  end=$((count + 50))
                  if [ $end -gt $total ]; then
                    end=$total
                  fi
                  # 子分類標題（縮排一層）
                  printf "  * **第 %d - %d 經**\n" "$start" "$end" >> _sidebar.md
                fi

                # 抓取第一個 # 標題行，移除 # 和前後空白
                display_name=$(grep -m 1 "^#" "$file" | sed 's/^#\+[[:space:]]*//' | xargs)
                if [ -z "$display_name" ]; then
                  display_name=$(basename "$file" .md)
                fi

                # 經文連結（縮排兩層，放在子分類下）
                printf "    * [%s](%s)\n" "$display_name" "$file" >> _sidebar.md

                count=$((count + 1))
              done

            else
              printf "  * (整理中...)\n" >> _sidebar.md
            fi

            printf "\n" >> _sidebar.md
          done

      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add _sidebar.md
          git diff --quiet && git diff --staged --quiet || \
            (git commit -m "Auto-update sidebar [skip ci]" && git push)
