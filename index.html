<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>《阿含經》白話計畫</title>
  <!-- Docsify CSS -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/slate.css"></link>

  <style>
    :root {
      --theme-color: #3e8ed0;
      --base-color: #666;
    }

    /* ════════════════════════════════
       漢堡選單按鈕 (手機版專用)
    ════════════════════════════════ */
    #sidebar-toggle {
      display: none; /* 電腦版隱藏 */
      position: fixed;
      top: 15px;
      left: 15px;
      z-index: 999;
      background: var(--theme-color);
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 4px;
      font-size: 20px;
      cursor: pointer;
      box-shadow: 0 2px 5px rgba(0,0,0,0.3);
    }

    /* ════════════════════════════════
       手機版樣式 (≤768px)
    ════════════════════════════════ */
    @media screen and (max-width: 768px) {
      #sidebar-toggle { display: block; } /* 手機版顯示漢堡按鈕 */

      .bottom-toolbar {
        left: 0 !important;
        padding: 0 10px !important;
        gap: 4px !important;
        width: 100% !important;
        transform: none !important;
        justify-content: space-around;
      }

      .bottom-toolbar button {
        padding: 6px 8px !important;
        font-size: 12px !important;
      }

      /* 當側邊欄收起時的樣式 */
      .sidebar--collapsed {
        transform: translateX(-100%);
        transition: transform 0.3s ease;
      }

      /* 讓內容區域在側邊欄打開時有間距 (可選) */
      body.sidebar-open .content {
        margin-left: 250px !important;
        transition: margin-left 0.3s ease;
      }
    }

    /* ════════════════════════════════
       側邊欄摺疊箭頭顏色 (Citation 2)
    ════════════════════════════════ */
    .sidebar-nav li:not(.collapse) > .section-link:after {
      content: '▼';
      font-size: 10px;
      margin-left: 5px;
      color: var(--theme-color);
    }
    .sidebar-nav li.collapse > .section-link:after {
      content: '▶';
      color: var(--base-color);
    }

    /* 底部工具列樣式 (Citation 2) */
    .bottom-toolbar {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(34, 34, 34, 0.9);
      padding: 10px 20px;
      display: flex;
      gap: 20px;
      border-radius: 8px 8px 0 0;
      z-index: 100;
    }

    .toolbar-nav, .toolbar-font { display: flex; gap: 5px; }
    .bottom-toolbar button {
      background: #444; color: white; border: none; padding: 6px 12px; cursor: pointer; border-radius: 4px;
    }
  </style>
</head>

<body>
  <!-- 漢堡選單按鈕 -->
  <button id="sidebar-toggle" title="切換側邊欄">☰</button>

  <div id="app">載入中...</div>

  <!-- 底部工具列 (Citation 2) -->
  <div class="bottom-toolbar">
    <div class="toolbar-nav">
      <button onclick="goPrevPage()" title="上一篇">◀ 上一篇</button>
      <button onclick="goNextPage()" title="下一篇">下一篇 ▶</button>
    </div>
    <div class="toolbar-font">
      <button onclick="changeFontSize(-2)" title="縮小文字">A−</button>
      <button onclick="resetFontSize()"    title="重置字體">重置</button>
      <button onclick="changeFontSize(2)"  title="放大文字">A+</button>
    </div>
  </div>

  <!-- Docsify Scripts -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-tabs@1/dist/docsify-tabs.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse@0.1.6/dist/docsify-sidebar-collapse.min.js"></script>

  <script>
    /* ════════════════════════════════
       Docsify 設定與終極解決方案 (Citation 3)
    ════════════════════════════════ */
    window.$docsify = {
      name: '《阿含經》白話計畫',
      loadSidebar: true,
      alias: { '/.*/_sidebar.md': '/_sidebar.md' },
      subMaxLevel: 2,
      auto2top: true,
      markdown: { gfm: true, breaks: true },
      plugins: [
        function(hook, vm) {
          // 1. 修正中文粗體
          hook.beforeEach(content => content.replace(/\*\*([^*\n]+?)\*\*/g, '<strong>$1</strong>'));

          // 2. 換頁置頂
          hook.doneEach(() => {
            setTimeout(() => {
              window.scrollTo(0, 0);
              const mainContent = document.querySelector('.content');
              if (mainContent) mainContent.scrollTop = 0;
            }, 100);
          });

          // 3. 【核心修復】手機側邊欄點擊攔截邏輯
          hook.mounted(() => {
            const sidebar = document.querySelector('.sidebar');
            if (!sidebar) return;

            // 手動切換按鈕事件
            document.getElementById('sidebar-toggle').addEventListener('click', function(e) {
              e.stopPropagation();
              sidebar.classList.toggle('sidebar--collapsed');
              document.body.classList.toggle('sidebar-open');
            });

            // 捕獲階段攔截點擊 (Citation 3 的改良版)
            sidebar.addEventListener('click', function(e) {
              if (window.innerWidth > 768) return; // 電腦版不處理

              const li = e.target.closest('li');
              if (!li) return;

              // 判斷是否點擊的是「展開/收合」按鈕（沒有 href 或 class 為 collapse）
              const isExpandButton = li.querySelector('.section-link') && 
                                     (li.classList.contains('collapse') || !li.querySelector('a[href^="#"]'));

              if (isExpandButton) {
                // 如果只是展開選單，直接 return，不觸發切換到 main 的動作
                return;
              }

              // 只有點擊真正的頁面連結時才執行「收起側邊欄」
              const link = e.target.closest('a');
              if (link && link.getAttribute('href') && !link.getAttribute('href').startsWith('#')) {
                setTimeout(() => {
                  sidebar.classList.add('sidebar--collapsed');
                  document.body.classList.remove('sidebar-open');
                }, 200); // 給予一點點延遲讓 Docsify 完成跳轉
              }
            }, true);

            // 點擊內容區域時自動收回側邊欄 (手機版體驗優化)
            document.querySelector('.content').addEventListener('click', () => {
              if (window.innerWidth <= 768 && !sidebar.classList.contains('sidebar--collapsed')) {
                sidebar.classList.add('sidebar--collapsed');
                document.body.classList.remove('sidebar-open');
              }
            });
          });
        }
      ]
    };

    /* ════════════════════════════════
       上一篇 / 下一篇 (Citation 1 & 3)
    ════════════════════════════════ */
    let _sidebarPaths = null;

    async function fetchSidebarPaths() {
      if (_sidebarPaths) return _sidebarPaths;
      try {
        const res = await fetch('_sidebar.md');
        if (!res.ok) throw new Error('fetch failed');
        const text = await res.text();
        const regex = /\[[^\]]+\]\((?!https?:\/\/)([^)#]+\.md)\)/g;
        const paths = [];
        let m;
        while ((m = regex.exec(text)) !== null) {
          const clean = m[1].replace(/^\.?\//, '').replace(/\.md$/, '');
          if (clean.toLowerCase() !== 'readme') paths.push(clean);
        }
        _sidebarPaths = paths;
        return paths;
      } catch (e) {
        console.warn('無法讀取 _sidebar.md', e);
        return [];
      }
    }

    function getCurrentPath() {
      return location.hash.replace(/^#\//, '').replace(/\.md$/, '');
    }

    async function goPrevPage() {
      const paths = await fetchSidebarPaths();
      const current = getCurrentPath();
      const idx = paths.indexOf(current);
      if (idx > 0) location.hash = '#/' + paths[idx - 1];
      else if (idx === -1 && paths.length > 0) location.hash = '#/' + paths[0];
      else alert('已經是第一篇了！');
    }

    async function goNextPage() {
      const paths = await fetchSidebarPaths();
      const current = getCurrentPath();
      const idx = paths.indexOf(current);
      if (idx !== -1 && idx < paths.length - 1) location.hash = '#/' + paths[idx + 1];
      else if (idx === -1 && paths.length > 0) location.hash = '#/' + paths[0];
      else alert('已經是最後一篇了！');
    }

    /* 字體大小控制 */
    let currentFontSize = 16;
    function changeFontSize(delta) {
      currentFontSize += delta;
      document.body.style.fontSize = currentFontSize + 'px';
    }
    function resetFontSize() {
      currentFontSize = 16;
      document.body.style.fontSize = '16px';
    }

    // 每次換頁後清除快取 (Citation 3)
    window.addEventListener('hashchange', () => { _sidebarPaths = null; });
  </script>
</body>
</html>
