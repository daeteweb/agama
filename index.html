<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>《阿含經》白話計畫</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  
  <link rel="stylesheet" href="lib/themes/vue.css">

  <style>
    /* ══════════════════════════════════════
       全域色彩變數
    ══════════════════════════════════════ */
    :root {
      --background:      #000000;
      --base-color:      #b59a4d;
      --theme-color:     #d4af37;
      --base-font-size:  18px;
      --toolbar-height:  52px;
    }

    /* ══════════════════════════════════════
       消滅所有深藍色：覆蓋 vue.css 的預設值
       vue.css 大量使用 #34495e / #2c3e50（深藍）當文字色
    ══════════════════════════════════════ */
    body,
    .markdown-section,
    .markdown-section p,
    .markdown-section li,
    .markdown-section td,
    .markdown-section th,
    .markdown-section blockquote,
    .markdown-section blockquote p,
    .content,
    p, li, td, th, span, label {
      color: var(--base-color) !important;
    }

    body {
      background-color: var(--background);
    }

    /* 標題全部白色 */
    h1, h2, h3, h4, h5, h6,
    .markdown-section h1,
    .markdown-section h2,
    .markdown-section h3,
    .markdown-section h4 {
      color: #ffffff !important;
    }

    /* 連結：金棕色，避免深藍 */
    a, .markdown-section a {
      color: #c8a84b !important;
    }
    a:hover, .markdown-section a:hover {
      color: #d4af37 !important;
    }

    /* 程式碼區塊 */
    .markdown-section code,
    .markdown-section pre code {
      color: #e0c97a !important;
      background: #111 !important;
    }
    .markdown-section pre {
      background: #111 !important;
    }

    /* ── 側邊欄 ── */
    .sidebar {
      background-color: #0a0a0a !important;
      border-right: 1px solid #222 !important;
    }
    .sidebar-nav li a,
    .sidebar-nav li span,
    .sidebar ul li a {
      color: var(--base-color) !important;
    }
    .sidebar-nav li.active > a,
    .sidebar-nav li > a.active {
      color: #d4af37 !important;
      border-right: 2px solid #d4af37;
    }
    .app-name, .app-name a {
      color: #d4af37 !important;
    }

    /* ── 搜尋框 ── */
    .search input {
      background: #111 !important;
      color: var(--base-color) !important;
      border: 1px solid #333 !important;
    }
    .search input::placeholder {
      color: #555 !important;
    }
    .search .results-panel {
      background: #0d0d0d !important;
      border: 1px solid #333 !important;
    }
    .search .results-panel a {
      border-bottom: 1px solid #222 !important;
    }
    .search .results-panel .matching-post h2 {
      color: #ffffff !important;
    }
    .search .results-panel .matching-post p {
      color: var(--base-color) !important;
    }

    /* ── Tabs 插件 ── */
    .docsify-tabs__tab {
      background: #111 !important;
      color: #777 !important;
      border: 1px solid #222 !important;
    }
    .docsify-tabs__tab--active {
      background: #000 !important;
      color: #d4af37 !important;
      border-bottom: 2px solid #d4af37 !important;
    }
    .docsify-tabs__content {
      background: #0a0a0a !important;
      border: 1px solid #222 !important;
      color: var(--base-color) !important;
    }

    /* ── 表格 ── */
    .markdown-section table tr {
      background: #0d0d0d !important;
      border-top: 1px solid #333 !important;
    }
    .markdown-section table tr:nth-child(2n) {
      background: #111 !important;
    }
    .markdown-section table th,
    .markdown-section table td {
      border: 1px solid #333 !important;
    }

    /* ── blockquote ── */
    .markdown-section blockquote {
      border-left: 4px solid #d4af37 !important;
      background: #0d0d0d !important;
    }

    /* ══════════════════════════════════════
       主內容區：底部留出工具列空間，不被蓋住
    ══════════════════════════════════════ */
    .markdown-section {
      font-size: var(--base-font-size) !important;
      padding-bottom: calc(var(--toolbar-height) + 24px) !important;
    }

    /* ══════════════════════════════════════
       底部工具列：固定在頁面底部，與側邊欄切齊
       left: 300px = docsify vue 主題的側邊欄預設寬度
    ══════════════════════════════════════ */
    .bottom-toolbar {
      position: fixed;
      bottom: 0;
      left: 300px;
      right: 0;
      height: var(--toolbar-height);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      background: rgba(8, 8, 8, 0.96);
      border-top: 1px solid #2a2a2a;
      backdrop-filter: blur(6px);
      box-sizing: border-box;
    }

    /* 左側：換頁按鈕 */
    .toolbar-nav {
      display: flex;
      gap: 8px;
    }

    /* 右側：字體控制 */
    .toolbar-font {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .toolbar-font .font-label {
      color: #555 !important;
      font-size: 12px;
    }

    /* 按鈕共用 */
    .bottom-toolbar button {
      background: #1a1a1a;
      color: #d4af37;
      border: 1px solid #3a3a3a;
      padding: 6px 14px;
      cursor: pointer;
      border-radius: 4px;
      font-size: 13px;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
    }
    .bottom-toolbar button:hover {
      background: #d4af37;
      color: #000;
      border-color: #d4af37;
    }

    /* 響應式：手機版側邊欄收合，工具列從左側開始 */
    @media screen and (max-width: 768px) {
      .bottom-toolbar {
        left: 0;
      }
    }
  </style>
</head>
<body>
  <div id="app">載入中...</div>

  <!-- 底部工具列 -->
  <div class="bottom-toolbar">
    <div class="toolbar-nav">
      <button onclick="goPrevPage()" title="上一篇">◀ 上一篇</button>
      <button onclick="goNextPage()" title="下一篇">下一篇 ▶</button>
    </div>
    <div class="toolbar-font">
      <span class="font-label">字體大小</span>
      <button onclick="changeFontSize(-2)" title="縮小文字">A−</button>
      <button onclick="resetFontSize()"    title="重置">重置</button>
      <button onclick="changeFontSize(2)"  title="放大文字">A+</button>
    </div>
  </div>

  <script>
    /* ════════════════════════════════
       Docsify 設定
    ════════════════════════════════ */
    window.$docsify = {
      name: '《阿含經》白話計畫',
      loadSidebar: true,
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md'
      },
      subMaxLevel: 2,
      auto2top: true,

      // 修正中文粗體：marked 對中文邊界有 bug，用 beforeEach 預處理
      plugins: [
        function(hook) {
          hook.beforeEach(function(content) {
            return content.replace(/\*\*([^*\n]+?)\*\*/g, '<strong>$1</strong>');
          });
        }
      ],

      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: '搜尋經文...',
        noData: '找不到結果',
        depth: 6
      },

      tabs: {
        persist: true,
        sync: false,
        theme: 'classic',
        tabComments: true,
        tabHeadings: true
      }
    };
  </script>

  <script>
    /* ════════════════════════════════
       字體大小控制
    ════════════════════════════════ */
    let currentSize = parseInt(localStorage.getItem('agama-font-size')) || 18;
    applyFontSize(currentSize);

    function changeFontSize(delta) {
      currentSize = Math.min(40, Math.max(12, currentSize + delta));
      applyFontSize(currentSize);
      localStorage.setItem('agama-font-size', currentSize);
    }

    function resetFontSize() {
      currentSize = 18;
      applyFontSize(currentSize);
      localStorage.removeItem('agama-font-size');
    }

    function applyFontSize(size) {
      document.documentElement.style.setProperty('--base-font-size', size + 'px');
    }

    /* ════════════════════════════════
       上一篇 / 下一篇
    ════════════════════════════════ */
    function getSidebarLinks() {
      return Array.from(document.querySelectorAll('.sidebar-nav a'))
        .filter(a => a.href && !a.href.endsWith('#'));
    }

    function getCurrentIndex(links) {
      return links.findIndex(a => a.href === location.href);
    }

    function goNextPage() {
      const links = getSidebarLinks();
      const idx = getCurrentIndex(links);
      if (idx !== -1 && idx < links.length - 1) {
        links[idx + 1].click();
      } else {
        alert('已經是最後一篇了！');
      }
    }

    function goPrevPage() {
      const links = getSidebarLinks();
      const idx = getCurrentIndex(links);
      if (idx > 0) {
        links[idx - 1].click();
      } else {
        alert('已經是第一篇了！');
      }
    }
  </script>

  <script src="lib/docsify.min.js"></script>
  <script src="lib/plugins/search.min.js"></script>
  <script src="lib/plugins/docsify-tabs.min.js"></script>
</body>
</html>
