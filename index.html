<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>《阿含經》白話計畫</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">

  <link rel="stylesheet" href="lib/themes/vue.css">

  <style>
    /* ══════════════════════════════════════
       全域色彩變數 (完全保留)
    ══════════════════════════════════════ */
    :root {
      --background:      #000000;
      --base-color:      #b59a4d;
      --theme-color:     #d4af37;
      --base-font-size:  18px;
      --toolbar-height:  52px;
    }

    /* ══════════════════════════════════════
       消滅所有深藍色 (完全保留)
    ══════════════════════════════════════ */
    body,
    .markdown-section,
    .markdown-section p,
    .markdown-section li,
    .markdown-section td,
    .markdown-section th,
    .markdown-section blockquote,
    .markdown-section blockquote p,
    .content,
    p, li, td, th, span, label {
      color: var(--base-color) !important;
    }

    body {
      background-color: var(--background);
    }

    h1, h2, h3, h4, h5, h6,
    .markdown-section h1,
    .markdown-section h2,
    .markdown-section h3,
    .markdown-section h4 {
      color: #ffffff !important;
    }

    strong, .markdown-section strong {
      color: #ffffff !important;
    }

    a, .markdown-section a {
      color: #c8a84b !important;
    }
    a:hover, .markdown-section a:hover {
      color: #d4af37 !important;
    }

    .markdown-section code,
    .markdown-section pre code {
      color: #e0c97a !important;
      background: #111 !important;
    }
    .markdown-section pre {
      background: #111 !important;
    }

    /* ── 側邊欄 (完全保留) ── */
    .sidebar {
      background-color: #0a0a0a !important;
      border-right: 1px solid #222 !important;
    }
    .sidebar-nav li a,
    .sidebar-nav li span,
    .sidebar ul li a {
      color: var(--base-color) !important;
    }
    .sidebar-nav li.active > a,
    .sidebar-nav li > a.active {
      color: #d4af37 !important;
      border-right: 2px solid #d4af37;
    }
    .app-name, .app-name a {
      color: #d4af37 !important;
    }

    /* ── 搜尋框 (完全保留) ── */
    .search input {
      background: #111 !important;
      color: var(--base-color) !important;
      border: 1px solid #333 !important;
    }
    .search input::placeholder {
      color: #555 !important;
    }
    .search .results-panel {
      background: #0d0d0d !important;
      border: 1px solid #333 !important;
    }
    .search .results-panel a {
      border-bottom: 1px solid #222 !important;
    }
    .search .results-panel .matching-post h2 {
      color: #ffffff !important;
    }
    .search .results-panel .matching-post p {
      color: var(--base-color) !important;
    }

    /* ── Tabs 插件 (完全保留) ── */
    .docsify-tabs__tab {
      background: #111 !important;
      color: #777 !important;
      border: 1px solid #222 !important;
    }
    .docsify-tabs__tab--active {
      background: #000 !important;
      color: #d4af37 !important;
      border-bottom: 2px solid #d4af37 !important;
    }
    .docsify-tabs__content {
      background: #0a0a0a !important;
      border: 1px solid #222 !important;
      color: var(--base-color) !important;
    }

    /* ── 表格 (完全保留) ── */
    .markdown-section table tr {
      background: #0d0d0d !important;
      border-top: 1px solid #333 !important;
    }
    .markdown-section table tr:nth-child(2n) {
      background: #111 !important;
    }
    .markdown-section table th,
    .markdown-section table td {
      border: 1px solid #333 !important;
    }

    /* ── blockquote (完全保留) ── */
    .markdown-section blockquote {
      border-left: 4px solid #d4af37 !important;
      background: #0d0d0d !important;
    }

    /* ══════════════════════════════════════
       漢堡選單按鈕：強制可見、金色橫線 (完全保留)
    ══════════════════════════════════════ */
    .sidebar-toggle {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      width: 40px !important;
      height: 40px !important;
      padding: 10px !important;
      cursor: pointer !important;
      z-index: 9999 !important;
      background: rgba(10,10,10,0.85) !important;
      border-radius: 0 0 6px 0 !important;
      display: flex !important;
      flex-direction: column !important;
      justify-content: space-between !important;
      box-sizing: border-box !important;
    }
    .sidebar-toggle span {
      display: block !important;
      width: 100% !important;
      height: 2px !important;
      background: #d4af37 !important;
      border-radius: 2px !important;
    }

    /* ══════════════════════════════════════
       主內容區：底部留出工具列空間 (完全保留)
    ══════════════════════════════════════ */
    .markdown-section {
      font-size: var(--base-font-size) !important;
      padding-bottom: calc(var(--toolbar-height) + 24px) !important;
    }

    /* ══════════════════════════════════════
       底部工具列 (完全保留)
    ══════════════════════════════════════ */
    .bottom-toolbar {
      position: fixed;
      bottom: 0;
      left: 300px;
      right: 0;
      height: var(--toolbar-height);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      background: rgba(8, 8, 8, 0.97);
      border-top: 1px solid #2a2a2a;
      backdrop-filter: blur(6px);
      box-sizing: border-box;
      gap: 8px;
    }

    .toolbar-nav,
    .toolbar-font {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-shrink: 0;
    }

    .bottom-toolbar button {
      background: #1a1a1a;
      color: #d4af37;
      border: 1px solid #3a3a3a;
      padding: 6px 12px;
      cursor: pointer;
      border-radius: 4px;
      font-size: 13px;
      transition: background 015s, color 0.15s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .bottom-toolbar button:hover {
      background: #d4af37;
      color: #000;
      border-color: #d4af37;
    }

    /* ══════════════════════════════════════
       手機版 (≤768px) (完全保留)
    ══════════════════════════════════════ */
    @media screen and (max-width: 768px) {
      .bottom-toolbar {
        left: 0;
        padding: 0 10px;
        gap: 4px;
      }
      .bottom-toolbar button {
        padding: 6px 8px;
        font-size: 12px;
      }
    }
    
    /* 側邊欄摺疊箭頭顏色 (完全保留) */
    .sidebar-nav li:not(.collapse) > .section-link:after {
      content: '▼';
      font-size: 10px;
      margin-left: 5px;
      color: var(--theme-color);
    }
    .sidebar-nav li.collapse > .section-link:after {
      content: '▶';
      color: var(--base-color);
    }
  </style>
</head>
<body class="sidebar--collapsed"> <!-- 預設手機版收起 -->
  <div id="app">載入中...</div>

  <!-- 底部工具列 (完全保留) -->
  <div class="bottom-toolbar">
    <div class="toolbar-nav">
      <button onclick="goPrevPage()" title="上一篇">◀ 上一篇</button>
      <button onclick="goNextPage()" title="下一篇">下一篇 ▶</button>
    </div>
    <div class="toolbar-font">
      <button onclick="changeFontSize(-2)" title="縮小文字">A−</button>
      <button onclick="resetFontSize()"    title="重置字體">重置</button>
      <button onclick="changeFontSize(2)"  title="放大文字">A+</button>
    </div>
  </div>

  <!-- 漢堡選單按鈕 (新增，用於手動切換) -->
  <div class="sidebar-toggle" id="mobile-menu-btn">
    <span></span>
    <span></span>
    <span></span>
  </div>

  <script>
    /* ════════════════════════════════
       Docsify 設定與終極解決方案 (僅在 plugins 中插入修復邏輯)
    ════════════════════════════════ */
    window.$docsify = {
      name: '《阿含經》白話計畫',
      loadSidebar: true,
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md'
      },
      subMaxLevel: 2,
      auto2top: true,
      markdown: {
        gfm: true,
        breaks: true
      },
      plugins: [
        function(hook, vm) {
          // 1. 修正中文粗體 (完全保留)
          hook.beforeEach(function(content) {
            return content.replace(/\*\*([^*\n]+?)\*\*/g, '<strong>$1</strong>');
          });

          // 2. 換頁置頂 (完全保留)
          hook.doneEach(function() {
            setTimeout(() => {
              window.scrollTo(0, 0);
              const mainContent = document.querySelector('.content');
              if (mainContent) mainContent.scrollTop = 0;
            }, 100);
          });

          // 3. 【核心修復】手機側邊欄點擊攔截邏輯 - 不會刪除任何原有樣式
          hook.mounted(function() {
            const sidebar = document.querySelector('.sidebar');
            if (sidebar) {
              // 使用 Capture 階段攔截，在 Docsify 原生事件觸發前先判斷
              sidebar.addEventListener('click', function(e) {
                if (window.innerWidth > 768) return; // 電腦版不處理

                const li = e.target.closest('li');
                if (!li) return;

                // 檢查這個 LI 是否包含子選單 (ul)
                const ul = li.querySelector('ul');
                if (ul) {
                  // 如果點擊的位置「不在」子選單內部，代表使用者是在點擊資料夾標題
                  if (!ul.contains(e.target)) {
                    // 攔截事件！阻止 Docsify 切換到 main 並關閉側邊欄
                    e.stopPropagation();
                    e.preventDefault();

                    // 手動切換 collapse class，讓選單展開/收合
                    li.classList.toggle('collapse');
                  }
                }
                // 如果沒有 ul (代表是真正的文章連結)，則不攔截，Docsify 會正常處理：關閉側邊欄並跳轉頁面
              }, true); 

              // 手動漢堡按鈕控制
              const menuBtn = document.getElementById('mobile-menu-btn');
              if (menuBtn) {
                menuBtn.addEventListener('click', function(e) {
                  e.stopPropagation();
                  sidebar.classList.toggle('sidebar--collapsed');
                });
              }

              // 點擊內容區自動收回側邊欄 (手機版體驗優化)
              document.querySelector('.content').addEventListener('click', () => {
                if (window.innerWidth <= 768 && !sidebar.classList.contains('sidebar--collapsed')) {
                  sidebar.classList.add('sidebar--collapsed');
                }
              });
            }
          });
        }
      ],

      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: '搜尋經文...',
        noData: '找不到結果',
        depth: 6
      },

      tabs: {
        persist: true,
        sync: false,
        theme: 'classic',
        tabComments: true,
        tabHeadings: true
      }
    };
  </script>

  <script>
    /* ════════════════════════════════
       字體大小控制 (完全保留)
    ════════════════════════════════ */
    let currentSize = parseInt(localStorage.getItem('agama-font-size')) || 18;
    applyFontSize(currentSize);

    function changeFontSize(delta) {
      currentSize = Math.min(40, Math.max(12, currentSize + delta));
      applyFontSize(currentSize);
      localStorage.setItem('agama-font-size', currentSize);
    }

    function resetFontSize() {
      currentSize = 18;
      applyFontSize(currentSize);
      localStorage.removeItem('agama-font-size');
    }

    function applyFontSize(size) {
      document.documentElement.style.setProperty('--base-font-size', size + 'px');
    }

    /* ════════════════════════════════
       上一篇 / 下一篇 (完全保留)
    ════════════════════════════════ */
    let _sidebarPaths = null; 

    async function fetchSidebarPaths() {
      if (_sidebarPaths) return _sidebarPaths;
      try {
        const res = await fetch('_sidebar.md');
        if (!res.ok) throw new Error('fetch failed');
        const text = await res.text();

        const regex = /\[[^\]]+\]\((?!https?:\/\/)([^)#]+\.md)\)/g;
        const paths =[];
        let m;
        while ((m = regex.exec(text)) !== null) {
          const clean = m[1].replace(/^\.?\//, '').replace(/\.md$/, '');
          if (clean.toLowerCase() !== 'readme') {
            paths.push(clean);
          }
        }
        _sidebarPaths = paths;
        return paths;
      } catch (e) {
        console.warn('無法讀取 _sidebar.md', e);
        return[];
      }
    }

    function getCurrentPath() {
      return location.hash.replace(/^#\//, '').replace(/\.md$/, '');
    }

    async function goNextPage() {
      const paths = await fetchSidebarPaths();
      const current = getCurrentPath();
      const idx = paths.indexOf(current);
      if (idx !== -1 && idx < paths.length - 1) {
        location.hash = '#/' + paths[idx + 1];
      } else if (idx === -1 && paths.length > 0) {
        location.hash = '#/' + paths[0]; 
      } else {
        alert('已經是最後一篇了！');
      }
    }

    async function goPrevPage() {
      const paths = awaitfetchSidebarPaths();
      const current = getCurrentPath();
      const idx = paths.indexOf(current);
      if (idx > 0) {
        location.hash = '#/' + paths[idx - 1];
      } else if (idx === -1 && paths.length > 0) {
        location.hash = '#/' + paths[0]; 
      } else {
        alert('已經是第一篇了！');
      }
    }

    // 每次換頁後清除快取
    window.addEventListener('hashchange', () => { _sidebarPaths = null; });
  </script>

  <script src="lib/docsify.min.js"></script>
  <script src="lib/plugins/search.min.js"></script>
  <script src="lib/plugins/docsify-tabs.min.js"></script>
  <script src="lib/plugins/docsify-sidebar-collapse.min.js"></script>
</body>
</html>
