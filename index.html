<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>《阿含經》白話計畫</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  
  <link rel="stylesheet" href="lib/themes/vue.css">

  <style>
    :root {
      /* 側邊欄與背景配色 */
      --background: #000000;
      --base-color: #b59a4d; /* 暗黃色，類似陳舊紙張的顏色 */
      --theme-color: #d4af37; /* 主題色，金黃色 */
    }

    body {
      background-color: var(--background);
      color: var(--base-color);
    }

    /* 側邊欄樣式修正 */
    .sidebar {
      background-color: #0a0a0a;
      border-right: 1px solid #222;
      color: var(--base-color);
    }

    .sidebar-nav li a {
      color: var(--base-color);
    }

    /* 標題顏色 */
    h1, h2, h3, h4 {
      color: #d4af37 !important;
    }

    /* 連結顏色（減少刺眼的藍色） */
    a {
      color: #8b732e;
    }

    /* Tabs 插件配色修正，確保在黑底下清晰 */
    .docsify-tabs__tab {
      background: #111 !important;
      color: #777 !important;
      border: 1px solid #222 !important;
    }

    .docsify-tabs__tab--active {
      background: #000 !important;
      color: #d4af37 !important;
      border-bottom: 2px solid #d4af37 !important;
    }

    /* 搜尋框樣式 */
    .search input {
      background: #111 !important;
      color: var(--base-color) !important;
      border: 1px solid #333 !important;
    }
    /* 設定字體大小的變數與控制按鈕樣式 */
:root {
  --base-font-size: 16px; /* 預設大小 */
}

.markdown-section {
  font-size: var(--base-font-size) !important;
}

/* 縮放按鈕的浮動面板 */
.font-control {
  position: fixed;
  bottom: 20px;
  right: 20px;
  z-index: 999;
  display: flex;
  gap: 10px;
  background: rgba(20, 20, 20, 0.8);
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #333;
}

.font-control button {
  background: #1a1a1a;
  color: #d4af37;
  border: 1px solid #d4af37;
  padding: 5px 12px;
  cursor: pointer;
  border-radius: 4px;
  font-size: 14px;
}

.font-control button:hover {
  background: #d4af37;
  color: #000;
}
  </style>
</head>
<body>
  <div id="app">載入中...</div>
  <div class="font-control">
  <button onclick="changeFontSize(2)">A+</button>
  <button onclick="changeFontSize(-2)">A-</button>
  <button onclick="resetFontSize()">重置</button>
</div>
<script>
    window.$docsify = {
      name: '《阿含經》白話計畫',
      loadSidebar: true,
      alias: {
    // 核心修正：不論在哪個路徑，都強制指向根目錄的 _sidebar.md
    '/.*/_sidebar.md': '/_sidebar.md'
      },
      subMaxLevel: 2,
      auto2top: true,
      
      // 搜尋插件配置
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: '搜尋經文...',
        noData: '找不到結果',
        depth: 6
      },

      // Tabs 插件配置
      tabs: {
        persist: true,
        sync: false,
        theme: 'classic',
        tabComments: true,
        tabHeadings: true
      }
    };
  </script>
  <script>
  // 1. 初始化：嘗試從瀏覽器記憶中讀取，若無則預設 18
  let currentSize = parseInt(localStorage.getItem('agama-font-size')) || 18;
  
  // 頁面載入時立即套用
  applyFontSize(currentSize);

  function changeFontSize(delta) {
    currentSize += delta;
    if (currentSize < 12) currentSize = 12;
    if (currentSize > 40) currentSize = 40;
    applyFontSize(currentSize);
    // 2. 儲存設定
    localStorage.setItem('agama-font-size', currentSize);
  }

  function resetFontSize() {
    currentSize = 18;
    applyFontSize(currentSize);
    localStorage.removeItem('agama-font-size');
  }

  function applyFontSize(size) {
    document.documentElement.style.setProperty('--base-font-size', size + 'px');
  }
</script>

  <script src="lib/docsify.min.js"></script>
  <script src="lib/plugins/search.min.js"></script>
  <script src="lib/plugins/docsify-tabs.min.js"></script>

</body>
</html>
